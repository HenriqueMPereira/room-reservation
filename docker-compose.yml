version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: reservation-db
    environment:
      POSTGRES_DB: room_reservation_db
      POSTGRES_USER: henrique
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reservation-network

  api:
    build: .
    container_name: room-reservation-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=db
      - DB_USER=henrique
      - DB_PASS=1234
    depends_on:
      - db
    networks:
      - reservation-network

volumes:
  postgres_data:

networks:
  reservation-network:
    driver: bridge